<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>

<!-- Deep link -->
<meta http-equiv="refresh" content="0;url='__DEEPLINK__'"/>

<title>Redirecting...</title>

<script>
var ua = navigator.userAgent.toLowerCase();

// PC → redirect luôn
if (!(ua.includes("android") || ua.includes("iphone"))) {
    window.location.href = "https://google.com";
}

// mobile fail mở app → fallback
setTimeout(() => {
    window.location.href = "https://shopee.vn";
}, 1500);
</script>

</head>
<body></body>
</html>
