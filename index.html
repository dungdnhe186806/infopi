<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Redirecting...</title>

<script>
function decodeBase64(str) {
    try {
        return decodeURIComponent(atob(str));
    } catch (e) {
        return null;
    }
}

// lấy path hoặc query
let path = location.pathname.replace("/", "");
let param = new URLSearchParams(location.search).get("d");

let encoded = param || path;

if (!encoded) {
    location.href = "https://google.com";
}

// decode
let deeplink = decodeBase64(encoded);

if (!deeplink) {
    location.href = "https://google.com";
}

// detect device
let ua = navigator.userAgent.toLowerCase();

if (ua.includes("android") || ua.includes("iphone")) {
    location.href = deeplink;

    setTimeout(() => {
        location.href = "https://shopee.vn";
    }, 1500);
} else {
    location.href = "https://google.com";
}
</script>

</head>
<body></body>
</html>
